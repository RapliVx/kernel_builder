name: Mirror Google Kernel 5.15 ACK

on:
  workflow_dispatch:

jobs:
  mirror-kernel:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Install Repo tool
        run: |
          mkdir -p ~/.bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/.bin/repo
          chmod a+rx ~/.bin/repo
          echo "$HOME/.bin" >> $GITHUB_PATH

      - name: Setup Git Configuration
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global color.ui false

      - name: Initialize and Sync Repository
        run: |
          mkdir kernel-workspace
          cd kernel-workspace
          repo init --depth=1 -u https://android.googlesource.com/kernel/manifest -b common-android13-5.15-lts
          repo sync -c --no-clone-bundle --no-tags --optimized-fetch --prune -j8 common

      - name: Push to GitHub (Branch 'google')
        run: |
          cd kernel-workspace/common
          git checkout -b google
          git remote add github https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push github google --force
