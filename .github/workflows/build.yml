name: "Advanced Kernel Build"

env:
  OUT_DIR: "out"
  KERNEL_VERSION: "5.15"
  ANDROID_VERSION: "13"

on:
  workflow_dispatch:
    inputs:
      kernelSourceURL:
        description: "Kernel Source Repository URL"
        required: true
        type: string
        default: "https://github.com/RapliVx/msm-5.15.git"
      kernelBranch:
        description: "Kernel Branch"
        required: true
        type: string
        default: "MikuKernel"
      kernelDevice:
        description: "Target Device (for defconfig name)"
        required: true
        type: string
        default: "gki"
      localVersion:
        description: "Custom localversion (e.g., -Miku-Edition)"
        required: false
        type: string
        default: ""
      buildKSU:
        description: "Select KSU Variants"
        required: true
        type: choice
        default: "all"
        options:
          - "vanilla"
          - "ksu"
          - "ksus"
          - "all"
      tickRate:
        description: "Kernel Tick Rate (Hz)"
        required: false
        type: choice
        default: "250Hz"
        options:
          - "default"
          - "100Hz"
          - "250Hz"
          - "300Hz"
          - "1000Hz"
      optimizationLevel:
        description: "Compiler Optimization Level"
        required: false
        type: choice
        default: "O2"
        options:
          - "default"
          - "O2"
          - "O3"
          - "Os"
      buildToolchain:
        description: "Select Build Toolchain"
        required: true
        type: choice
        default: "android-tools"
        options:
          - "android-tools"
          - "custom-tools"
      ltoType:
        description: "Link Time Optimization (LTO)"
        required: true
        type: choice
        default: "thin"
        options:
          - "thin"
          - "full"

jobs:
  build-kernel:
    name: "Build: ${{ matrix.variant }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ fromJSON(
          inputs.buildKSU == 'all' && '["vanilla", "ksu", "ksus"]' ||
          inputs.buildKSU == 'vanilla' && '["vanilla"]' ||
          inputs.buildKSU == 'ksu' && '["ksu"]' ||
          '["ksus"]' ) }}
    env:
      KERNEL_DIR: workspace
      KERNEL_NAME: common
      DEFCONFIG_NAME: ${{ github.event.inputs.kernelDevice }}_defconfig
      WORK_DIR: ${{ github.workspace }}

    steps:
      - name: "Setup Workspace"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y repo rsync aria2 build-essential bc curl flex cpio git zip dwarves libelf-dev gcc-aarch64-linux-gnu libssl-dev python3 clang lld llvm llvm-dev
          mkdir -p ${{ env.WORK_DIR }}
          echo "BUILD_TIME=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: "Clone Kernel Source"
        working-directory: ${{ env.WORK_DIR }}
        run: |
          git clone --depth=1 --branch ${{ github.event.inputs.kernelBranch }} \
            ${{ github.event.inputs.kernelSourceURL }} common

      # ==========================================
      # TOOLCHAIN SETUP (AOSP TOOLS)
      # ==========================================
      - name: "Initialize AOSP Toolchain"
        if: github.event.inputs.buildToolchain == 'android-tools'
        working-directory: ${{ env.WORK_DIR }}
        run: |
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android13-5.15-lts --depth=1
          repo sync --optimized-fetch --prune -j$(nproc --all)
          rm -rf .repo

          # Sync professional Clang r584948b
          aria2c -x 16 -s 16 -o clang.tar.gz "https://github.com/topnotchfreaks/clang/releases/download/v1.0.0/clang-r584948b.tar.gz"
          mkdir -p prebuilts/clang/host/linux-x86/clang-r584948b
          tar -xzf clang.tar.gz -C prebuilts/clang/host/linux-x86/clang-r584948b
          rm -f clang.tar.gz

          # Environment cleanup
          rm -rf prebuilts/clang/host/linux-x86/clang-3289846
          rm -rf prebuilts/clang/host/linux-x86/clang-r450784e
          rm -rf prebuilts/clang/host/linux-x86/clang-r547379

          # Apply build config updates
          sed -i 's/^CLANG_VERSION=.*/CLANG_VERSION=r584948b/' common/build.config.constants
          sed -i '/^DEFCONFIG=gki_defconfig/d' common/build.config.gki
          echo "DEFCONFIG=${{ env.DEFCONFIG_NAME }}" >> common/build.config.gki
          sed -i '/^POST_DEFCONFIG_CMDS="check_defconfig"/d' common/build.config.gki

      # ==========================================
      # TOOLCHAIN SETUP (CUSTOM TOOLS)
      # ==========================================
      - name: "Retrieve Custom Toolchain"
        if: github.event.inputs.buildToolchain == 'custom-tools'
        run: |
          CLANG_URL=$(curl -sL "https://api.github.com/repos/greenforce-project/greenforce_clang/releases/latest" | grep "browser_download_url.*tar.gz" | cut -d '"' -f 4 | head -n 1)
          mkdir -p clang
          wget -O "clang/clang.tar.gz" "$CLANG_URL"
          tar -xf clang/clang.tar.gz -C clang
          CLANG_BIN=$(find $(pwd)/clang -type d -name "bin" | head -n 1)
          echo "CLANG_PATH=$CLANG_BIN" >> $GITHUB_ENV
          echo "$CLANG_BIN" >> $GITHUB_PATH

      - name: "Setup Build Swap"
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 20

      # ==========================================
      # KERNELSU & SUSFS INTEGRATION
      # ==========================================
      - name: "Apply KernelSU and SuSFS Patches"
        if: matrix.variant != 'vanilla'
        working-directory: ${{ env.WORK_DIR }}/common
        run: |
          set -e
          rm -rf ./KernelSU ./KernelSU-Next ./drivers/kernelsu
          
          echo "Applying KernelSU-Next (dev-susfs)..."
          curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/dev-susfs/kernel/setup.sh" | bash -s dev-susfs
          
          echo "Applying All Managers Support..."
          curl -LSs "https://raw.githubusercontent.com/rinnsakaguchi/builder/refs/heads/anisphia/kernel-patches/ksu/ksun-add-more-managers-support.patch" | patch -p1 -d KernelSU-Next
          
          if [ ! -L "drivers/kernelsu" ]; then
             ln -sf ../KernelSU-Next drivers/kernelsu
          fi

          if [ "${{ matrix.variant }}" == "ksus" ]; then
              echo "Integrating SuSFS drivers..."
              git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android13-5.15 susfs
              patch -p1 < susfs/kernel_patches/50_add_susfs_in_gki-android13-5.15.patch || true
              cp -f susfs/kernel_patches/fs/susfs.c fs/susfs.c
              cp -f susfs/kernel_patches/include/linux/susfs.h include/linux/susfs.h
              cp -f susfs/kernel_patches/include/linux/susfs_def.h include/linux/susfs_def.h || true
              rm -rf susfs
          fi

      # ==========================================
      # CONFIGURATION TUNING
      # ==========================================
      - name: "Configure Kernel Features"
        working-directory: ${{ env.WORK_DIR }}/common
        run: |
          CONFIG_FILE="arch/arm64/configs/${{ env.DEFCONFIG_NAME }}"
          
          # Localversion
          if [ -n "${{ github.event.inputs.localVersion }}" ]; then
            echo "CONFIG_LOCALVERSION=\"${{ github.event.inputs.localVersion }}\"" >> "$CONFIG_FILE"
          fi

          # LTO Setup
          sed -i '/CONFIG_LTO_CLANG/d' "$CONFIG_FILE"
          echo "CONFIG_LTO_CLANG=y" >> "$CONFIG_FILE"
          if [ "${{ github.event.inputs.ltoType }}" == "thin" ]; then
            echo "CONFIG_LTO_CLANG_THIN=y" >> "$CONFIG_FILE"
          else
            echo "CONFIG_LTO_CLANG_FULL=y" >> "$CONFIG_FILE"
          fi

          # Optimization Level
          sed -i '/CONFIG_CC_OPTIMIZE_FOR/d' "$CONFIG_FILE"
          case "${{ github.event.inputs.optimizationLevel }}" in
            O2) echo "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y" >> "$CONFIG_FILE" ;;
            O3) echo "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE_O3=y" >> "$CONFIG_FILE" ;;
            Os) echo "CONFIG_CC_OPTIMIZE_FOR_SIZE=y" >> "$CONFIG_FILE" ;;
          esac

          # Tick Rate
          if [ "${{ github.event.inputs.tickRate }}" != "default" ]; then
            HZ_VAL=$(echo "${{ github.event.inputs.tickRate }}" | sed 's/Hz//')
            sed -i '/CONFIG_HZ/d' "$CONFIG_FILE"
            echo "CONFIG_NO_HZ_IDLE=y" >> "$CONFIG_FILE"
            echo "CONFIG_HZ=$HZ_VAL" >> "$CONFIG_FILE"
            echo "CONFIG_HZ_$HZ_VAL=y" >> "$CONFIG_FILE"
          fi

          # Enable KSU flags
          if [ "${{ matrix.variant }}" != "vanilla" ]; then
            sed -i '/CONFIG_KSU/d' "$CONFIG_FILE"
            echo "CONFIG_KSU=y" >> "$CONFIG_FILE"
            if [ "${{ matrix.variant }}" == "ksus" ]; then
               echo "CONFIG_KSU_SUSFS=y" >> "$CONFIG_FILE"
               echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> "$CONFIG_FILE"
               echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> "$CONFIG_FILE"
               echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> "$CONFIG_FILE"
            fi
          fi

      # ==========================================
      # COMPILATION
      # ==========================================
      - name: "Build Kernel (AOSP Tools)"
        if: github.event.inputs.buildToolchain == 'android-tools'
        working-directory: ${{ env.WORK_DIR }}
        run: |
          LTO=${{ github.event.inputs.ltoType }} \
          BUILD_CONFIG=common/build.config.gki.aarch64 \
          build/build.sh -j$(nproc --all)

      - name: "Build Kernel (Custom Tools)"
        if: github.event.inputs.buildToolchain == 'custom-tools'
        working-directory: ${{ env.WORK_DIR }}/common
        run: |
          make ARCH=arm64 LLVM=1 CROSS_COMPILE=aarch64-linux-gnu- ${{ env.DEFCONFIG_NAME }}
          make ARCH=arm64 LLVM=1 CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc --all)

      - name: "Prepare Artifact"
        run: |
          mkdir -p output
          if [ "${{ github.event.inputs.buildToolchain }}" == "android-tools" ]; then
            cp out/dist/Image output/Image.${{ matrix.variant }}
          else
            cp workspace/common/arch/arm64/boot/Image output/Image.${{ matrix.variant }}
          fi

      - name: "Upload Build Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ matrix.variant }}
          path: output/Image.${{ matrix.variant }}
          retention-days: 1

  package-release:
    name: "Package and Notify"
    runs-on: ubuntu-latest
    needs: build-kernel
    steps:
      - name: "Download Kernels"
        uses: actions/download-artifact@v4
        with:
          path: ./kernels/

      - name: "Package AnyKernel3"
        run: |
          git clone --depth=1 https://github.com/topnotchfreaks/AnyKernel3 -b master AnyKernel3
          find kernels -name "Image.*" -exec cp {} AnyKernel3/Image \;
          
          ZIP_NAME="Kernel_${{ github.event.inputs.kernelBranch }}_$(date +'%Y%m%d').zip"
          cd AnyKernel3
          zip -r9 "../$ZIP_NAME" * -x .git/*
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "ZIP_PATH=$(pwd)/../$ZIP_NAME" >> $GITHUB_ENV

      - name: "Send Notification to Telegram"
        run: |
          CAPTION="✅ *Kernel Build Successful*
          
          • *Branch:* \`${{ github.event.inputs.kernelBranch }}\`
          • *Device:* \`${{ github.event.inputs.kernelDevice }}\`
          • *Optimization:* \`${{ github.event.inputs.optimizationLevel }}\`
          • *LTO:* \`${{ github.event.inputs.ltoType }}\`
          • *Tick Rate:* \`${{ github.event.inputs.tickRate }}\`
          • *Toolchain:* \`${{ github.event.inputs.buildToolchain }}\`
          
          *Modules:* KernelSU-Next, SuSFS (where applicable)."

          curl -s -F document=@"${{ env.ZIP_PATH }}" \
            -F caption="$CAPTION" \
            -F parse_mode="Markdown" \
            -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument"
