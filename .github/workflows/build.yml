name: "Android Kernel Build"

on:
  workflow_dispatch:
    inputs:
      KERNEL_REPO:
        description: 'Kernel Source Repository URL'
        required: true
        default: 'https://github.com/RapliVx/msm-5.15.git'
      KERNEL_BRANCH:
        description: 'Branch Name'
        required: true
        default: 'MikuKernel'

env:
  WORK_DIR: workspace
  KERNEL_LOC_DIR: workspace
  KERNEL_NAME: common
  DEFCONFIG_NAME: gki_defconfig
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  build-kernels:
    name: "Build: ${{ matrix.variant }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [Miku-NonKSU, Miku-KSU, Miku-KSUS]
        
    steps:
      - name: "Initialize Environment"
        run: |
          sudo apt-get update
          sudo apt-get install -y repo curl git zip aria2 rsync
          mkdir -p ${{ env.WORK_DIR }}
          echo "BUILD_TIME=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: "Sync Clang and AOSP Environment"
        working-directory: ${{ env.WORK_DIR }}
        run: |
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android13-5.15-lts --depth=1
          repo sync --optimized-fetch --prune -j8
          rm -rf .repo
          rm -rf common

          # Custom Clang Retrieval
          aria2c -x 16 -s 16 -o prebuilts/clang/host/linux-x86/clang-r547379.tar.gz "https://github.com/topnotchfreaks/clang/releases/download/v1.0.0/clang-r547379.tar.gz"
          mkdir -p prebuilts/clang/host/linux-x86/clang-r547379
          tar -xzf prebuilts/clang/host/linux-x86/clang-r547379.tar.gz -C prebuilts/clang/host/linux-x86/clang-r547379
          rm -rf prebuilts/clang/host/linux-x86/clang-r547379.tar.gz

          # Cleanup unused toolchains
          rm -rf prebuilts/clang/host/linux-x86/clang-3289846
          rm -rf prebuilts/clang/host/linux-x86/clang-r450784e
          rm -rf prebuilts/clang/host/linux-x86/clang-stable

      - name: "Clone Kernel Source"
        working-directory: ${{ env.WORK_DIR }}
        run: |
          git clone --depth=1 -b ${{ github.event.inputs.KERNEL_BRANCH }} ${{ github.event.inputs.KERNEL_REPO }} common

      # ==========================================
      # PATCHING: BASE KERNELSU (KSU & KSUS)
      # ==========================================
      - name: "Apply Base KernelSU-Next"
        working-directory: ${{ env.WORK_DIR }}/common
        if: ${{ matrix.variant != 'Miku-NonKSU' }}
        run: |
          set -e
          rm -rf ./KernelSU ./KernelSU-Next ./drivers/kernelsu
          
          echo "Applying KernelSU-Next (dev-susfs)..."
          curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/dev-susfs/kernel/setup.sh" | bash -s dev-susfs
          
          echo "Patching All Managers Support..."
          if [ -d "KernelSU-Next" ]; then
              curl -LSs "https://raw.githubusercontent.com/rinnsakaguchi/builder/refs/heads/anisphia/kernel-patches/ksu/ksun-add-more-managers-support.patch" | patch -p1 -d KernelSU-Next
          elif [ -d "KernelSU" ]; then
              curl -LSs "https://raw.githubusercontent.com/rinnsakaguchi/builder/refs/heads/anisphia/kernel-patches/ksu/ksun-add-more-managers-support.patch" | patch -p1 -d KernelSU
          else
              echo "Error: KernelSU directory not found!"
              exit 1
          fi
          
          if [ ! -L "drivers/kernelsu" ]; then
             if [ -d "KernelSU-Next" ]; then
                 ln -sf ../KernelSU-Next drivers/kernelsu
             else
                 ln -sf ../KernelSU drivers/kernelsu
             fi
          fi

          echo "Cleaning base configurations..."
          sed -i '/CONFIG_KSU/d' arch/arm64/configs/${{ env.DEFCONFIG_NAME }}
          sed -i '/CONFIG_KPROBES/d' arch/arm64/configs/${{ env.DEFCONFIG_NAME }}
          sed -i '/CONFIG_KALLSYMS/d' arch/arm64/configs/${{ env.DEFCONFIG_NAME }}

      # ==========================================
      # PATCHING: SUSFS (ONLY KSUS)
      # ==========================================
      - name: "Apply SuSFS Configuration"
        working-directory: ${{ env.WORK_DIR }}/common
        if: ${{ matrix.variant == 'Miku-KSUS' }}
        run: |
          echo "Retrieving SuSFS drivers..."
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android13-5.15
          
          if [ -f "susfs4ksu/kernel_patches/50_add_susfs_in_gki-android13-5.15.patch" ]; then
             patch -p1 --forward < "susfs4ksu/kernel_patches/50_add_susfs_in_gki-android13-5.15.patch" || echo "Patch conflict ignored."
          fi
          
          mkdir -p fs include/linux
          cp -f susfs4ksu/kernel_patches/fs/susfs.c fs/susfs.c
          cp -f susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/susfs.h
          cp -f susfs4ksu/kernel_patches/include/linux/susfs_def.h include/linux/susfs_def.h || true
          
          echo "Applying SuSFS configurations..."
          cat >> "arch/arm64/configs/${{ env.DEFCONFIG_NAME }}" << 'EOF'
          CONFIG_KSU=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_SU=y
          CONFIG_OVERLAY_FS=y
          CONFIG_KALLSYMS=y
          CONFIG_KALLSYMS_ALL=y
          CONFIG_FTRACE=y
          CONFIG_KPROBES=y
          CONFIG_KPROBE_EVENTS=y
          EOF
          
          rm -rf susfs4ksu
          echo "SuSFS configurations applied."

      # ==========================================
      # PATCHING: STANDARD KSU (ONLY KSU)
      # ==========================================
      - name: "Apply Standard KernelSU Configuration"
        working-directory: ${{ env.WORK_DIR }}/common
        if: ${{ matrix.variant == 'Miku-KSU' }}
        run: |
          echo "Applying standard KernelSU configurations..."
          cat >> "arch/arm64/configs/${{ env.DEFCONFIG_NAME }}" << 'EOF'
          CONFIG_KSU=y
          # CONFIG_KSU_SUSFS is not set
          CONFIG_OVERLAY_FS=y
          CONFIG_KALLSYMS=y
          CONFIG_KALLSYMS_ALL=y
          CONFIG_FTRACE=y
          CONFIG_KPROBES=y
          CONFIG_KPROBE_EVENTS=y
          EOF
          echo "Standard KernelSU configurations applied."

      # ==========================================
      # OPTIMIZATION & COMPILATION
      # ==========================================
      - name: "Apply Performance Optimizations"
        working-directory: ${{ env.WORK_DIR }}/common
        run: |
          CONFIG_FILE="./arch/arm64/configs/${{ env.DEFCONFIG_NAME }}"
          cat >> "$CONFIG_FILE" << 'EOF'
          CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y
          CONFIG_TCP_CONG_ADVANCED=y
          CONFIG_TCP_CONG_BIC=n
          CONFIG_TCP_CONG_WESTWOOD=y
          CONFIG_TCP_CONG_HTCP=n
          CONFIG_TCP_CONG_BBR=y
          CONFIG_DEFAULT_WESTWOOD=y
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          EOF

      - name: "Compile Kernel"
        working-directory: ${{ env.WORK_DIR }}
        run: |
          LTO=thin \
          BUILD_CONFIG=${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}/build.config.gki.aarch64 \
          build/build.sh -j$(nproc --all)

      - name: "Extract Build Artifacts"
        working-directory: ${{ env.WORK_DIR }}/out/dist
        run: |
          OUTPUT_NAME="Image.${{ matrix.variant }}"
          cp Image "$OUTPUT_NAME"
          echo "OUTPUT_NAME=$OUTPUT_NAME" >> $GITHUB_ENV

      - name: "Upload Kernel Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.variant }}-kernel
          path: ${{ env.WORK_DIR }}/out/dist/${{ env.OUTPUT_NAME }}
          retention-days: 1

  # ==========================================
  # PACKAGING & DEPLOYMENT
  # ==========================================
  package-kernels:
    name: "Final Packaging Protocol"
    runs-on: ubuntu-latest
    needs: [build-kernels]
    steps:
      - name: "Download Artifacts"
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts/

      - name: "Create Flashable Zips"
        run: |
          set -e
          git clone --depth=1 https://github.com/RapliVx/AnyKernel3.git -b GKI AnyKernel3
          mkdir -p release_zips

          cat > AnyKernel3/banner << 'EOF'
          ------------------------------------
                 MIKU KERNEL - DIVA
                 By RapliVX
          ------------------------------------
          EOF

          find ./artifacts -name "Image.*" | while read img_path; do
            echo "::group::Processing $img_path"
            filename=$(basename "$img_path")
            
            ZIP_TAG="UNKNOWN"
            if [[ "$filename" == *"Miku-KSU"* ]] && [[ "$filename" != *"Miku-KSUS"* ]]; then ZIP_TAG="Miku-KSU"; fi
            if [[ "$filename" == *"Miku-KSUS"* ]]; then ZIP_TAG="Miku-KSUS"; fi
            if [[ "$filename" == *"Miku-NonKSU"* ]]; then ZIP_TAG="Miku-NonKSU"; fi
            
            cp -f "$img_path" AnyKernel3/Image
            ZIP_NAME="Kernel-${ZIP_TAG}_$(date +'%Y-%m-%d').zip"
            
            cd AnyKernel3
            zip -r9 "../release_zips/$ZIP_NAME" * -x .git/* README.md
            cd ..
            
            rm AnyKernel3/Image
            echo "::endgroup::"
          done

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: release_zips/*.zip
          tag_name: "Build-${{ github.run_number }}"
          name: "Kernel Release - Build ${{ github.run_number }}"
          body: |
            ## Kernel Build Log
            **Build Date:** $(date +'%Y-%m-%d')
            **Source Repo:** ${{ github.event.inputs.KERNEL_REPO }}
            **Branch:** ${{ github.event.inputs.KERNEL_BRANCH }}
            
            ### Artifacts:
            - **Miku-KSUS:** KernelSU-Next + SuSFS injected.
            - **Miku-KSU:** Standard KernelSU-Next.
            - **Miku-NonKSU:** Vanilla kernel.

      - name: "Send Telegram Notifications"
        if: success()
        run: |
          cd release_zips
          FILE_LIST=""
          for f in *.zip; do
            FILE_LIST="${FILE_LIST}- <code>${f}</code>%0A"
          done
          
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/Build-${{ github.run_number }}"
          
          MESSAGE="<b>KERNEL BUILD SUCCESSFUL</b>%0A%0A"
          MESSAGE="${MESSAGE}<b>Packages Generated:</b>%0A${FILE_LIST}%0A"
          MESSAGE="${MESSAGE}<a href='${RELEASE_URL}'>Download Release Here</a>"
          
          curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ env.TELEGRAM_CHAT_ID }}" \
            -d text="${MESSAGE}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview=true
