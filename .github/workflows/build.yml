name: "Kernel Build"

env:
  OUT_DIR: "out"
  ANDROID_VERSION: "13"
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

on:
  workflow_dispatch:
    inputs:
      kernelSourceURL:
        description: "Kernel Source Repository URL"
        required: true
        type: string
        default: "https://github.com/RapliVx/msm-5.15.git"
      kernelBranch:
        description: "Kernel Branch"
        required: true
        type: string
        default: "MikuKernel"
      kernelDevice:
        description: "Target Device (for defconfig name)"
        required: true
        type: string
        default: "miku"
      localVersion:
        description: "Custom localversion (e.g., -Miku-Edition)"
        required: false
        type: string
        default: ""
      buildKSU:
        description: "Select Variants"
        required: true
        type: choice
        default: "all"
        options:
          - "vanilla"
          - "ksu"
          - "all"
      tickRate:
        description: "Kernel Tick Rate (Hz)"
        required: false
        type: choice
        default: "250Hz"
        options:
          - "default"
          - "100Hz"
          - "250Hz"
          - "300Hz"
          - "1000Hz"
      optimizationLevel:
        description: "Compiler Optimization Level"
        required: false
        type: choice
        default: "O2"
        options:
          - "default"
          - "O2"
          - "O3"
          - "Os"
      buildToolchain:
        description: "Select Build Toolchain"
        required: true
        type: choice
        default: "android-tools"
        options:
          - "android-tools"
          - "custom-tools"
      ltoType:
        description: "Link Time Optimization (LTO)"
        required: true
        type: choice
        default: "thin"
        options:
          - "thin"
          - "full"

jobs:
  build-kernel:
    name: "Build: ${{ matrix.variant }}"
    runs-on: ubuntu-latest
    outputs:
      ci_version: ${{ steps.extract_version.outputs.CI_VERSION }}
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ fromJSON(
          github.event.inputs.buildKSU == 'all' && '["vanilla", "ksu"]' ||
          github.event.inputs.buildKSU == 'vanilla' && '["vanilla"]' ||
          '["ksu"]' ) }}
    env:
      WORK_DIR: workspace
      DEFCONFIG_NAME: ${{ github.event.inputs.kernelDevice }}_defconfig

    steps:
      - name: "Setup Build Environment"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y repo rsync aria2 build-essential bc curl flex cpio git zip dwarves libelf-dev gcc-aarch64-linux-gnu libssl-dev python3 clang lld llvm llvm-dev
          mkdir -p ${{ env.WORK_DIR }}
          echo "BUILD_TIME=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: "Sync AOSP Tools & Clang r547379"
        if: github.event.inputs.buildToolchain == 'android-tools'
        working-directory: ${{ env.WORK_DIR }}
        run: |
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android13-5.15-lts --depth=1
          repo sync --optimized-fetch --prune --force-sync -j$(nproc --all)
          rm -rf common
          rm -rf .repo
          aria2c -x 16 -s 16 -o clang.tar.gz "https://github.com/topnotchfreaks/clang/releases/download/v1.0.0/clang-r547379.tar.gz"
          mkdir -p prebuilts/clang/host/linux-x86/clang-r547379
          tar -xzf clang.tar.gz -C prebuilts/clang/host/linux-x86/clang-r547379
          rm -f clang.tar.gz
          sed -i 's/^CLANG_VERSION=.*/CLANG_VERSION=r547379/' build.config.constants || true

      - name: "Clone Custom Kernel Source"
        working-directory: ${{ env.WORK_DIR }}
        run: |
          git clone --depth=1 --branch ${{ github.event.inputs.kernelBranch }} \
            ${{ github.event.inputs.kernelSourceURL }} common

      - name: "Retrieve Custom Toolchain (If selected)"
        if: github.event.inputs.buildToolchain == 'custom-tools'
        run: |
          CLANG_URL=$(curl -sL "https://api.github.com/repos/greenforce-project/greenforce_clang/releases/latest" | grep "browser_download_url.*tar.gz" | cut -d '"' -f 4 | head -n 1)
          mkdir -p clang
          wget -qO "clang/clang.tar.gz" "$CLANG_URL"
          tar -xf clang/clang.tar.gz -C clang
          CLANG_BIN=$(find $(pwd)/clang -type d -name "bin" | head -n 1)
          echo "CLANG_PATH=$CLANG_BIN" >> $GITHUB_ENV
          echo "$CLANG_BIN" >> $GITHUB_PATH

      - name: "Setup Swap 20GB"
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 20

      - name: "Integrate KernelSU-Next"
        if: matrix.variant == 'ksu'
        working-directory: ${{ env.WORK_DIR }}/common
        run: |
          set -e
          rm -rf ./KernelSU ./KernelSU-Next ./drivers/kernelsu
          echo "Applying KernelSU-Next (dev-susfs)..."
          curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/dev-susfs/kernel/setup.sh" | bash -s dev-susfs
          echo "Applying All Managers Patch..."
          curl -LSs "https://raw.githubusercontent.com/rinnsakaguchi/builder/refs/heads/anisphia/kernel-patches/ksu/ksun-add-more-managers-support.patch" | patch -p1 -d KernelSU-Next
          if [ ! -L "drivers/kernelsu" ]; then
             ln -sf ../KernelSU-Next drivers/kernelsu
          fi

      - name: "Provide SuSFS Headers"
        if: matrix.variant == 'ksu'
        working-directory: ${{ env.WORK_DIR }}/common
        run: |
          echo "Retrieving SuSFS components..."
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android13-5.15 susfs
          mkdir -p include/linux fs
          cp -f susfs/kernel_patches/include/linux/susfs.h include/linux/
          cp -f susfs/kernel_patches/include/linux/susfs_def.h include/linux/ || true
          cp -f susfs/kernel_patches/fs/susfs.c fs/

      - name: "Apply SuSFS System Patches"
        if: matrix.variant == 'ksu'
        working-directory: ${{ env.WORK_DIR }}/common
        run: |
          echo "Patching kernel system files for SuSFS..."
          patch -p1 < susfs/kernel_patches/50_add_susfs_in_gki-android13-5.15.patch || echo "Hunks failed but continuing..."
          rm -rf susfs

      - name: "Configure Kernel Features"
        working-directory: ${{ env.WORK_DIR }}/common
        run: |
          CONFIG_FILE="arch/arm64/configs/${{ env.DEFCONFIG_NAME }}"
          if [ -n "${{ github.event.inputs.localVersion }}" ]; then
            echo "CONFIG_LOCALVERSION=\"${{ github.event.inputs.localVersion }}\"" >> "$CONFIG_FILE"
          fi
          sed -i '/CONFIG_LTO_CLANG/d' "$CONFIG_FILE"
          echo "CONFIG_LTO_CLANG=y" >> "$CONFIG_FILE"
          if [ "${{ github.event.inputs.ltoType }}" == "thin" ]; then
            echo "CONFIG_LTO_CLANG_THIN=y" >> "$CONFIG_FILE"
          else
            echo "CONFIG_LTO_CLANG_FULL=y" >> "$CONFIG_FILE"
          fi
          sed -i '/CONFIG_CC_OPTIMIZE_FOR/d' "$CONFIG_FILE"
          case "${{ github.event.inputs.optimizationLevel }}" in
            O2) echo "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y" >> "$CONFIG_FILE" ;;
            O3) echo "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE_O3=y" >> "$CONFIG_FILE" ;;
            Os) echo "CONFIG_CC_OPTIMIZE_FOR_SIZE=y" >> "$CONFIG_FILE" ;;
          esac
          if [ "${{ github.event.inputs.tickRate }}" != "default" ]; then
            HZ_VAL=$(echo "${{ github.event.inputs.tickRate }}" | sed 's/Hz//')
            sed -i '/CONFIG_HZ/d' "$CONFIG_FILE"
            echo "CONFIG_NO_HZ_IDLE=y" >> "$CONFIG_FILE"
            echo "CONFIG_HZ=$HZ_VAL" >> "$CONFIG_FILE"
            echo "CONFIG_HZ_$HZ_VAL=y" >> "$CONFIG_FILE"
          fi
          sed -i '/CONFIG_KSU/d' "$CONFIG_FILE"
          
          if [ "${{ matrix.variant }}" == "ksu" ]; then
             echo "Enabling KSU + SuSFS..."
             echo "CONFIG_KSU=y" >> "$CONFIG_FILE"
             echo "CONFIG_KSU_SUSFS=y" >> "$CONFIG_FILE"
             echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> "$CONFIG_FILE"
             echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> "$CONFIG_FILE"
             echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> "$CONFIG_FILE"
             echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> "$CONFIG_FILE"
             echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> "$CONFIG_FILE"
             echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> "$CONFIG_FILE"
             echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> "$CONFIG_FILE"
             echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> "$CONFIG_FILE"
             echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> "$CONFIG_FILE"
             echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> "$CONFIG_FILE"
             echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> "$CONFIG_FILE"
             echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> "$CONFIG_FILE"
             echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> "$CONFIG_FILE"
             echo "CONFIG_KSU_SUSFS_SUS_SU=y" >> "$CONFIG_FILE"
          fi

      - name: "Extract Kernel Version"
        id: extract_version
        working-directory: ${{ env.WORK_DIR }}/common
        run: |
          K_VER=$(grep -m 1 '^VERSION =' Makefile | awk '{print $3}')
          K_PATCH=$(grep -m 1 '^PATCHLEVEL =' Makefile | awk '{print $3}')
          K_SUB=$(grep -m 1 '^SUBLEVEL =' Makefile | awk '{print $3}')
          FULL_VER="${K_VER}.${K_PATCH}.${K_SUB}"
          
          echo "CI_VERSION=$FULL_VER" >> $GITHUB_OUTPUT
          echo "CI_VERSION=$FULL_VER" >> $GITHUB_ENV
          echo "Version Extracted: $FULL_VER"

      - name: "Build Kernel"
        working-directory: ${{ env.WORK_DIR }}
        run: |
          LTO=${{ github.event.inputs.ltoType }} \
          BUILD_CONFIG=common/build.config.gki.aarch64 \
          build/build.sh -j$(nproc --all)

      - name: "Prepare Artifact"
        run: |
          mkdir -p output
          cp workspace/out/dist/Image output/Image.${{ matrix.variant }} || cp out/dist/Image output/Image.${{ matrix.variant }}

      - name: "Upload Build Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ matrix.variant }}
          path: output/Image.${{ matrix.variant }}
          retention-days: 1

  package-release:
    name: "Release Packaging"
    runs-on: ubuntu-latest
    needs: build-kernel
    permissions:
      contents: write
    env:
      CI_VERSION: ${{ needs.build-kernel.outputs.ci_version }}
    steps:
      - name: "Download Built Kernels"
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts/

      - name: "Create Variant Packages"
        run: |
          set -e
          echo "CURRENT_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          git clone --depth=1 https://github.com/RapliVx/AnyKernel3.git -b GKI ak3_base
          cat << 'EOF' > ak3_base/banner
           --------------------------------------- 
                                                   
                  M I K U   K E R N E L            
                                                   
           --------------------------------------- 
          EOF
          mkdir -p final_zips
          
          for variant in vanilla ksu; do
            if [ -d "./artifacts/kernel-$variant" ]; then
              echo "Packaging variant: $variant"
              cp -r ak3_base "ak3-$variant"
              cp -f "./artifacts/kernel-$variant/Image.$variant" "ak3-$variant/Image"
              
              # ZIP it
              ZIP_NAME="MikuKernel-${CI_VERSION}-${variant^^}-$(date +'%Y%m%d').zip"
              cd "ak3-$variant"
              zip -r9 "../final_zips/$ZIP_NAME" * -x .git/* README.md
              cd ..
            fi
          done

      - name: "Push to GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          files: final_zips/*.zip
          tag_name: "Build-${{ github.run_number }}-${{ github.sha }}"
          name: "Kernel Build: ${{ env.CI_VERSION }}"
          body: |
            ![Banner](https://raw.githubusercontent.com/RapliVx/msm-5.15/main/image/banner.png)
            
            ### 🛠️ Build Information
            - **Build Date:** ${{ env.CURRENT_DATE }}
            - **Kernel Version:** `${{ env.CI_VERSION }}`
            - **Defconfig:** `${{ github.event.inputs.kernelDevice }}_defconfig`
            - **Branch:** `${{ github.event.inputs.kernelBranch }}`
            - **LTO:** `${{ github.event.inputs.ltoType }}`
            - **Tick Rate:** `${{ github.event.inputs.tickRate }}`
            - **Optimization:** `${{ github.event.inputs.optimizationLevel }}`
            - **Source:** ${{ github.event.inputs.kernelSourceURL }}
            
            ### 📦 Artifacts Detail
            1. **Vanilla:** Pure Stock Infrastructure.
            2. **KSU:** KernelSU-Next with SuSFS Injection.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Send Telegram Status"
        if: success()
        run: |
          cd final_zips
          LIST=""
          for f in *.zip; do LIST="${LIST}📦 <code>${f}</code>%0A"; done
          
          COMMIT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/Build-${{ github.run_number }}-${{ github.sha }}"
          
          MSG="<b>✅ MikuKernel ${CI_VERSION} Build Completed!</b>%0A%0A"
          MSG="${MSG}<b>📱 Defconfig:</b> <code>${{ github.event.inputs.kernelDevice }}_defconfig</code>%0A"
          MSG="${MSG}<b>🌿 Branch:</b> <code>${{ github.event.inputs.kernelBranch }}</code>%0A"
          MSG="${MSG}<b>🛠️ Toolchain:</b> <code>${{ github.event.inputs.buildToolchain }}</code>%0A"
          MSG="${MSG}<b>⚙️ LTO:</b> <code>${{ github.event.inputs.ltoType }}</code> | <b>Tick:</b> <code>${{ github.event.inputs.tickRate }}</code>%0A"
          MSG="${MSG}<b>🚀 Optimization:</b> <code>${{ github.event.inputs.optimizationLevel }}</code>%0A"
          MSG="${MSG}<b>📌 Commit:</b> <code>${COMMIT_SHA}</code> (Run #${{ github.run_number }})%0A%0A"
          MSG="${MSG}<b>📦 Generated Packages:</b>%0A${LIST}%0A"
          MSG="${MSG}🔗 <a href='${RELEASE_URL}'>Download from GitHub Releases</a>"
          
          curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ env.TELEGRAM_CHAT_ID }}" \
            -d text="${MSG}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview=true
